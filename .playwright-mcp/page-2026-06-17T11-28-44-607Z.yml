  - generic [ref=e439]:
    - generic [ref=e440]:
      - generic [ref=e441]: Hoe berekenen we dit?
      - button [ref=e442] [cursor=pointer]:
        - img [ref=e443]
    - paragraph [ref=e446]: "De berekening is een schatting op basis van drie factoren: jouw opwekvermogen, huishoudgrootte en de gemiddelde Nederlandse energieprijzen."
    - generic [ref=e447]:
      - generic [ref=e448]: Stap 1
      - generic [ref=e449]: Omrekenen naar kWp
      - generic [ref=e450]: Elk zonnepaneel levert gemiddeld 400 Wp. We rekenen jouw aantal panelen om naar het totale vermogen in kilowatt-peak (kWp).
      - generic [ref=e451]: kWp = aantal panelen × 0,4
    - generic [ref=e452]:
      - generic [ref=e453]: Stap 2
      - generic [ref=e454]: Schatting van het overschot
      - generic [ref=e455]: Op basis van kWp en huishoudgrootte schatten we hoeveel zonne-energie jaarlijks onbenut teruggeleverd wordt. Meer panelen = meer overschot; meer personen = minder overschot.
      - generic [ref=e456]: Opgeslagen kWh ≈ kWp × 50 − personen × 10
    - generic [ref=e457]:
      - generic [ref=e458]: Stap 3
      - generic [ref=e459]: Besparing berekenen
      - generic [ref=e460]: De WaterAccu zet dat overschot om in warm water. De besparing bestaat uit vermeden gaskosten plus de waarde van de zelf gebruikte stroom — gebaseerd op actuele tarieven.
      - generic [ref=e461]: Besparing ≈ opgeslagen kWh × €0,28 (gas + stroom gecombineerd)
    - paragraph [ref=e462]: Dit is een indicatieve schatting. Werkelijke besparing hangt af van jouw energietarief, verbruikspatroon en seizoen. Gemiddelde besparing op basis van Nederlandse huishoudens in 2024.
