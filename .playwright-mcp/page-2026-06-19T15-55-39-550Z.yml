    - paragraph [ref=e628]: "De berekening is een schatting op basis van drie factoren: jouw opwekvermogen, huishoudgrootte en de gemiddelde Nederlandse energieprijzen."
    - generic [ref=e629]:
      - generic [ref=e630]: Stap 1
      - generic [ref=e631]: Omrekenen naar kWp
      - generic [ref=e632]: Elk zonnepaneel levert gemiddeld 400 Wp. We rekenen jouw aantal panelen om naar het totale vermogen in kilowatt-peak (kWp).
      - generic [ref=e633]: kWp = aantal panelen × 0,4
    - generic [ref=e634]:
      - generic [ref=e635]: Stap 2
      - generic [ref=e636]: Schatting van het overschot
      - generic [ref=e637]: Op basis van kWp en huishoudgrootte schatten we hoeveel zonne-energie jaarlijks onbenut teruggeleverd wordt. Meer panelen = meer overschot; meer personen = minder overschot.
      - generic [ref=e638]: Opgeslagen kWh ≈ kWp × 50 − personen × 10
    - generic [ref=e639]:
      - generic [ref=e640]: Stap 3
      - generic [ref=e641]: Besparing berekenen
      - generic [ref=e642]: De WaterAccu zet dat overschot om in warm water. De besparing bestaat uit vermeden gaskosten plus de waarde van de zelf gebruikte stroom — gebaseerd op actuele tarieven.
