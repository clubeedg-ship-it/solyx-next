      - generic [ref=e55]:
        - heading "Algemene vragen" [level=2] [ref=e56]
        - generic [ref=e57]:
          - button "Wat is een WaterAccu? En waarom wil ik er een?" [expanded] [ref=e58] [cursor=pointer]:
            - generic [ref=e59]: Wat is een WaterAccu? En waarom wil ik er een?
          - generic [ref=e62]: De WaterAccu is geen 'echte' batterij, maar onze term voor het opslaan van energie als warm water. Hij bestaat uit de Nymo en een standaard elektrische boiler, waarmee huishoudens hun zonne-energie beter benutten en besparen op gas. Hij produceert geen elektriciteit maar warm water — en gemiddeld gaat 20–25% van je energierekening naar het verwarmen van water.
        - generic [ref=e63]:
          - button "Is een zonneboiler hetzelfde als een WaterAccu?" [ref=e64] [cursor=pointer]:
            - generic [ref=e65]: Is een zonneboiler hetzelfde als een WaterAccu?
          - generic [ref=e67]: Ja! De WaterAccu is simpelweg de term die Solyx Energy gebruikt om de opslag van zonne-energie te benadrukken. Maar het is precies hetzelfde als een zonneboiler. 😊
        - generic [ref=e68]:
          - button "Waarom zou ik mijn eigen zonne-energie meer willen gebruiken?" [ref=e69] [cursor=pointer]:
            - generic [ref=e70]: Waarom zou ik mijn eigen zonne-energie meer willen gebruiken?
          - generic [ref=e72]: Om kosten te besparen én omdat het duurzaam is. Gemiddeld wordt maar 31% van de opgewekte zonne-energie door het huishouden zelf gebruikt — 69% gaat terug naar het net. De meeste huishoudens verwarmen water nog met gas, dus je overschot aan zonne-energie daarvoor inzetten is een slimmere keuze. De besparing groeit bovendien naarmate de salderingsregeling wordt afgebouwd.
        - generic [ref=e73]:
          - button "Hoeveel kan ik besparen met de WaterAccu?" [ref=e74] [cursor=pointer]:
            - generic [ref=e75]: Hoeveel kan ik besparen met de WaterAccu?
          - generic [ref=e77]: Je besparing hangt af van het aantal personen in je huishouden en je aantal zonnepanelen. Gemiddeld besparen klanten €338 per jaar. Vul je situatie in op onze website voor een persoonlijke schatting.
        - generic [ref=e78]:
          - button "Hoe zit het met de salderingsregeling en terugleverkosten?" [ref=e79] [cursor=pointer]:
            - generic [ref=e80]: Hoe zit het met de salderingsregeling en terugleverkosten?
          - generic [ref=e82]: De salderingsregeling wordt in 2027 afgeschaft. Tot die tijd worden verbruik en opwek jaarlijks met elkaar verrekend. Vanaf 2027 levert teruglevering veel minder op. Terugleverkosten worden nu al bovenop het salderen in rekening gebracht — genoeg redenen om je eigen zonne-energie meer te gebruiken!
