        - text: Verbruik vindt vooral plaats
        - strong [ref=e440]: "'s ochtends en 's avonds"
        - text: . Overdag, als de panelen op volle kracht draaien, is er weinig verbruik thuis. Die onbenutte energie gaat terug het net op — voor bijna niets. De WaterAccu vangt dat overschot op en slaat het op als warm water.
      - img "Zonder vs Met WaterAccu — dagcurve zonne-energie" [ref=e442]
  - generic [ref=e443]:
    - generic [ref=e444]:
      - generic [ref=e445]: Hoe berekenen we dit?
      - button [ref=e446] [cursor=pointer]:
        - img [ref=e447]
    - paragraph [ref=e450]: "De berekening is een schatting op basis van drie factoren: jouw opwekvermogen, huishoudgrootte en de gemiddelde Nederlandse energieprijzen."
    - generic [ref=e451]:
      - generic [ref=e452]: Stap 1
      - generic [ref=e453]: Omrekenen naar kWp
      - generic [ref=e454]: Elk zonnepaneel levert gemiddeld 400 Wp. We rekenen jouw aantal panelen om naar het totale vermogen in kilowatt-peak (kWp).
      - generic [ref=e455]: kWp = aantal panelen × 0,4
    - generic [ref=e456]:
      - generic [ref=e457]: Stap 2
      - generic [ref=e458]: Schatting van het overschot
      - generic [ref=e459]: Op basis van kWp en huishoudgrootte schatten we hoeveel zonne-energie jaarlijks onbenut teruggeleverd wordt. Meer panelen = meer overschot; meer personen = minder overschot.
      - generic [ref=e460]: Opgeslagen kWh ≈ kWp × 50 − personen × 10
    - generic [ref=e461]:
      - generic [ref=e462]: Stap 3
      - generic [ref=e463]: Besparing berekenen
      - generic [ref=e464]: De WaterAccu zet dat overschot om in warm water. De besparing bestaat uit vermeden gaskosten plus de waarde van de zelf gebruikte stroom — gebaseerd op actuele tarieven.
      - generic [ref=e465]: Besparing ≈ opgeslagen kWh × €0,28 (gas + stroom gecombineerd)
    - paragraph [ref=e466]: Dit is een indicatieve schatting. Werkelijke besparing hangt af van jouw energietarief, verbruikspatroon en seizoen. Gemiddelde besparing op basis van Nederlandse huishoudens in 2024.
