    - generic [ref=e27]:
      - generic [ref=e28]: In 3 stappen
      - heading "Zo installeer je de WaterAccu" [level=2] [ref=e29]
      - generic [ref=e30]:
        - generic [ref=e31]:
          - generic [ref=e32]: "1"
          - img "Solyx Energy Boiler" [ref=e34]
          - heading "Elektrische boiler" [level=3] [ref=e35]
          - paragraph [ref=e36]: Sluit de elektrische boiler aan volgens de (normale) instructies. Of laat een installateur dit doen.
          - generic [ref=e37]: De Nymo werkt met alle elektrische boilers die geen elektronische functies hebben (zoals displays en timers). Smart boilers zijn niet geschikt.
        - generic [ref=e38]:
          - generic [ref=e39]: "2"
          - img "Nymo Sensor aansluiten" [ref=e41]
          - heading "Nymo Sensor" [level=3] [ref=e42]
          - paragraph [ref=e43]: Plug de Nymo Sensor in de P1-poort van jouw slimme meter, met het meegeleverde kabeltje. Plug & play, dus!
          - generic [ref=e44]: De P1-poort van jouw slimme meter bezet? Dan kan een P1-splitter worden meegeleverd.
        - generic [ref=e45]:
          - generic [ref=e46]: "3"
          - img "Nymo Hoofdunit aansluiten" [ref=e48]
          - heading "Nymo Hoofdunit" [level=3] [ref=e49]
          - paragraph [ref=e50]: Sluit de Nymo aan tussen de voeding (stopcontact) en de elektrische boiler. Geen zin in? Bestel de Nymo bekabeld.
          - generic [ref=e51]: De Nymo wordt bij de boiler geïnstalleerd, als enige elektrische voeding van de boiler. Zo kan de Nymo de voeding dimmen op basis van het zonne-overschot.
    - generic [ref=e53]:
      - generic [ref=e54]: WaterAccu opstellingen
      - heading "Welke opstelling past bij jouw huis?" [level=2] [ref=e55]
      - generic [ref=e56]:
        - generic [ref=e57]:
          - button "CV-combiketel" [ref=e58] [cursor=pointer]
          - button "Hybride warmtepomp" [ref=e59] [cursor=pointer]
          - button "Elektrische warmtepomp" [ref=e60] [cursor=pointer]
          - button "Stadsverwarming" [ref=e61] [cursor=pointer]
          - button "CV + warmtewisselaar" [ref=e62] [cursor=pointer]
        - generic [ref=e64]:
          - img "CV-combiketel opstelling" [ref=e66]
          - generic [ref=e67]:
            - heading "Centrale Verwarming (CV)" [level=3] [ref=e68]
            - generic [ref=e69]:
              - button "Informatie" [ref=e70] [cursor=pointer]
              - button "Na-/bijverwarming" [ref=e71] [cursor=pointer]
            - generic [ref=e72]:
              - heading "WaterAccu onderdelen" [level=4] [ref=e73]
              - list [ref=e74]:
                - listitem [ref=e75]: Nymo
                - listitem [ref=e76]: Elektrische boiler, zonder elektronische of smart functies (zoals displays of timers).
              - heading "Functie" [level=4] [ref=e77]
              - paragraph [ref=e78]: Onbenutte stroom wordt door de Nymo naar de elektrische boiler gestuurd om tapwater mee te verwarmen.
    - generic [ref=e80]:
      - generic [ref=e81]: Combinaties
      - heading "Werkt de WaterAccu samen met mijn andere apparaten?" [level=2] [ref=e82]
      - generic [ref=e83]:
        - generic [ref=e84]:
          - heading "WaterAccu + thuisbatterij" [level=3] [ref=e85]
          - paragraph [ref=e86]: "Dat kan zeker! Belangrijk is om onderscheid te maken tussen twee opties:"
          - list [ref=e87]:
            - listitem [ref=e88]:
              - strong [ref=e89]: "Optie 1:"
              - text: Een thuisbatterij voor eigengebruik (die niet teruglevert).
            - listitem [ref=e90]:
              - strong [ref=e91]: "Optie 2:"
              - text: Een thuisbatterij die wel teruglevert aan het net.
          - paragraph [ref=e92]:
            - strong [ref=e93]: "Bij optie 1:"
            - text: stel de drempelwaarde van de Nymo (standaard 100W) hoger in dan die van de thuisbatterij — zo krijgt de batterij voorrang, en gaat de WaterAccu pas aan bij écht overschot.
          - paragraph [ref=e94]:
            - strong [ref=e95]: "Bij optie 2:"
            - text: voorkom dat de Nymo de teruglevering vanuit de batterij gebruikt. De eenvoudigste oplossing is een tijdschakelaar of slimme stekker vóór de Nymo, zodat deze buiten zonne-uren uitstaat. Geavanceerde aansturing via bijvoorbeeld HomeAssistant is ook mogelijk.
        - generic [ref=e96]:
          - heading "WaterAccu + keukenboiler" [level=3] [ref=e97]
          - paragraph [ref=e98]: De combinatie met een keukenboiler — zoals een close-in boiler of kokendwaterkraan — is technisch soms mogelijk, maar eigenlijk niet interessant of aan te raden.
          - list [ref=e99]:
            - listitem [ref=e100]: Veel keukenboilers (zoals een Quooker) bevatten slimme elektronica, waardoor ze niet geschikt zijn voor de manier waarop de Nymo het vermogen moduleert.
            - listitem [ref=e101]: Zelfs als het technisch wel mogelijk is, is de opslagcapaciteit meestal te klein (10–20L) om effectief zonne-energie in op te slaan.
            - listitem [ref=e102]: Bij apparaten zoals een Quooker wil je altijd direct warm of kokend water beschikbaar hebben — onafhankelijk van het moment van zonnestroom.
    - generic [ref=e104]:
      - generic [ref=e105]: Goed om te weten
      - heading "Aanvullende informatie" [level=2] [ref=e106]
      - generic [ref=e107]:
        - generic [ref=e108]:
          - heading "Vlaamse SEW-premie" [level=3] [ref=e109]
          - paragraph [ref=e110]:
            - text: Met de premie 'Sturing Elektrische Warmte' (SEW) krijg je
            - strong [ref=e111]: 50% van de aankoop- en installatiekosten
            - text: terug, met een maximum van €400. De Nymo en Solar iBoost staan op de lijst met erkende sturingsapparaten. Alle informatie via
            - link "Fluvius" [ref=e112] [cursor=pointer]:
              - /url: https://www.fluvius.be/nl/premies/premies-voor-huishoudelijke-klanten/sturing-elektrische-warmte
            - text: .
        - generic [ref=e113]:
          - heading "Netcongestie & afschakelende omvormers" [level=3] [ref=e114]
          - paragraph [ref=e115]: Netcongestie ontstaat als er meer stroom aan het net geleverd wordt dan het aankan. Om dit te verminderen schakelen omvormers uit bij te hoge netspanning — er wordt dan geen stroom meer geproduceerd. Het verhogen van eigen gebruik via een WaterAccu helpt hiertegen.
        - generic [ref=e116]:
          - heading "Tapwater, kraanwater, leidingwater" [level=3] [ref=e117]
          - paragraph [ref=e118]: Gemiddeld wordt 80% van het warme tapwater gebruikt voor douchen. De overige 20% is voor afwassen, handen wassen en overig keuken-/badkamergebruik. Zo'n 16–20% van de energierekening gaat naar het verwarmen van tapwater — meestal op gas. Dat kan beter op onbenutte zonne-energie.
    - generic [ref=e121]:
      - heading "Klaar voor jouw WaterAccu?" [level=2] [ref=e122]
      - paragraph [ref=e123]: Bestel de Nymo, of laat 'm direct installeren door één van onze partners. In 20 minuten geregeld.
      - link "Aan de slag" [ref=e125] [cursor=pointer]:
