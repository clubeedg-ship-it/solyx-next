        - text: Verbruik vindt vooral plaats
        - strong [ref=e438]: "'s ochtends en 's avonds"
        - text: . Overdag, als de panelen op volle kracht draaien, is er weinig verbruik thuis. Die onbenutte energie gaat terug het net op — voor bijna niets. De WaterAccu vangt dat overschot op en slaat het op als warm water.
      - img "Zonder vs Met WaterAccu — dagcurve zonne-energie" [ref=e440]
  - generic [ref=e441]:
    - generic [ref=e442]:
      - generic [ref=e443]: Hoe berekenen we dit?
      - button [ref=e444] [cursor=pointer]:
        - img [ref=e445]
    - paragraph [ref=e448]: "De berekening is een schatting op basis van drie factoren: jouw opwekvermogen, huishoudgrootte en de gemiddelde Nederlandse energieprijzen."
    - generic [ref=e449]:
      - generic [ref=e450]: Stap 1
      - generic [ref=e451]: Omrekenen naar kWp
      - generic [ref=e452]: Elk zonnepaneel levert gemiddeld 400 Wp. We rekenen jouw aantal panelen om naar het totale vermogen in kilowatt-peak (kWp).
      - generic [ref=e453]: kWp = aantal panelen × 0,4
    - generic [ref=e454]:
      - generic [ref=e455]: Stap 2
      - generic [ref=e456]: Schatting van het overschot
      - generic [ref=e457]: Op basis van kWp en huishoudgrootte schatten we hoeveel zonne-energie jaarlijks onbenut teruggeleverd wordt. Meer panelen = meer overschot; meer personen = minder overschot.
      - generic [ref=e458]: Opgeslagen kWh ≈ kWp × 50 − personen × 10
    - generic [ref=e459]:
      - generic [ref=e460]: Stap 3
      - generic [ref=e461]: Besparing berekenen
      - generic [ref=e462]: De WaterAccu zet dat overschot om in warm water. De besparing bestaat uit vermeden gaskosten plus de waarde van de zelf gebruikte stroom — gebaseerd op actuele tarieven.
      - generic [ref=e463]: Besparing ≈ opgeslagen kWh × €0,28 (gas + stroom gecombineerd)
    - paragraph [ref=e464]: Dit is een indicatieve schatting. Werkelijke besparing hangt af van jouw energietarief, verbruikspatroon en seizoen. Gemiddelde besparing op basis van Nederlandse huishoudens in 2024.
